version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "03:00"
    open-pull-requests-limit: 20

  - package-ecosystem: "cargo"
    directories:
      - "/src/sandbox/runtime"
      - "/src/code-validator/guest"
    schedule:
      interval: "daily"
      time: "03:00"
    open-pull-requests-limit: 20

  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/src/code-validator/guest"
    schedule:
      interval: "daily"
      time: "03:00"
    open-pull-requests-limit: 20
    ignore:
      # Built from a hyperlight-js release-tag checkout into deps/js-host-api via
      # a file: dependency — not a registry package, so dependabot can't bump it.
      - dependency-name: "@hyperlight-dev/js-host-api"
